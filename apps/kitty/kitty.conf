include onedark.conf

font_family      JetBrains Mono Medium Nerd Font Complete
bold_font        JetBrains Mono Extra Bold Nerd Font Complete
italic_font      JetBrains Mono Medium Italic Nerd Font Complete
bold_italic_font JetBrains Mono ExtBd Ita Nerd Font Complete

font_size 11.0
font_features JetBrainsMonoNerdFontComplete-Medium zero

cursor_shape beam
cursor_text_color background
cursor_blink_interval 0
focus_follows_mouse yes

enable_audio_bell no

tab_bar_edge bottom
tab_bar_style separator
tab_separator " "
tab_bar_min_tabs 2
tab_bar_margin_width 0
tab_bar_margin_height 0
tab_title_template " {title} "

tab_bar_background #353b45
active_tab_foreground   #3e4451
active_tab_background   #61afef
active_tab_font_style   bold
inactive_tab_foreground #abb2bf
inactive_tab_background #3e4451
inactive_tab_font_style normal
