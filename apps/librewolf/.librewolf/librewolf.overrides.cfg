// Smooth scrolling
lockPref("general.smoothScroll.currentVelocityWeighting", "0.15");
lockPref("general.smoothScroll.mouseWheel.durationMaxMS", 250);
lockPref("general.smoothScroll.mouseWheel.durationMinMS", 250);
lockPref("general.smoothScroll.msdPhysics.enabled", true);
lockPref("general.smoothScroll.msdPhysics.motionBeginSpringConstant", 400);
lockPref("general.smoothScroll.msdPhysics.regularSpringConstant", 600);
lockPref("general.smoothScroll.msdPhysics.slowdownMinDeltaMS", 120);
lockPref("general.smoothScroll.other.durationMaxMS", 500);
lockPref("general.smoothScroll.pages.durationMaxMS", 350);
lockPref("general.smoothScroll.stopDecelerationWeighting", "0.8");

// Increase scroll speed
lockPref("mousewheel.min_line_scroll_amount", 20);

// Enable webrender
lockPref("gfx.webrender.all", true);
// Enable hardware acceleration
lockPref("layers.acceleration.force-enabled", true);
